<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Record Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0b1728;
  --ink: #162032;
  --blue: #1565c0;
  --sky: #2196f3;
  --cyan: #00bcd4;
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #8b5cf6;
  --white: #ffffff;
  --cream: #f8fafc;
  --border: #e2e8f0;
  --muted: #64748b;
  --light: #f1f5f9;
  --card: #ffffff;
  --sidebar-w: 250px;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Epilogue',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
button{cursor:pointer;font-family:'Epilogue',sans-serif;}
input,select{font-family:'Epilogue',sans-serif;}

/* ===== SCREENS ===== */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}

/* ===== LOGIN ===== */
#loginScreen{
  background: linear-gradient(135deg, #0b1728 0%, #0d2137 40%, #112240 100%);
  align-items:center; justify-content:center; flex-direction:column;
  position:relative; overflow:hidden;
}
#loginScreen::before{
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse 60% 50% at 30% 40%, rgba(33,150,243,.12) 0%, transparent 60%),
              radial-gradient(ellipse 50% 60% at 70% 60%, rgba(0,188,212,.08) 0%, transparent 60%);
}
.login-grid{
  position:absolute; inset:0; opacity:.04;
  background-image: linear-gradient(var(--sky) 1px, transparent 1px),
                    linear-gradient(90deg, var(--sky) 1px, transparent 1px);
  background-size: 50px 50px;
}
.login-box{
  position:relative; z-index:2;
  background: rgba(255,255,255,.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px;
  padding: 48px 44px;
  width: 420px;
  box-shadow: 0 40px 80px rgba(0,0,0,.4);
  animation: fadeUp .5s ease;
}
.login-logo{
  text-align:center; margin-bottom:32px;
}
.login-logo .emblem{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,var(--sky),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem; margin:0 auto 12px;
  box-shadow: 0 8px 24px rgba(33,150,243,.4);
}
.login-logo h1{
  font-family:'Syne',sans-serif; font-size:1.4rem; color:white;
  font-weight:800; letter-spacing:-.02em;
}
.login-logo p{color:rgba(255,255,255,.4);font-size:.8rem;margin-top:4px;}

.portal-tabs{
  display:flex; background:rgba(255,255,255,.07); border-radius:10px;
  padding:4px; gap:4px; margin-bottom:28px;
}
.ptab{
  flex:1; padding:8px; border-radius:7px; border:none;
  background:transparent; color:rgba(255,255,255,.5);
  font-size:.78rem; font-weight:600; transition:all .2s;
}
.ptab.active{background:rgba(255,255,255,.15);color:white;}

.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
.form-group input, .form-group select{
  width:100%;padding:12px 14px;border-radius:10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:white;font-size:.88rem;outline:none;
  transition:border-color .2s;
}
.form-group input::placeholder{color:rgba(255,255,255,.25);}
.form-group input:focus,.form-group select:focus{border-color:var(--sky);}
.form-group select option{background:var(--navy);color:white;}

.login-btn{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(90deg,var(--blue),var(--sky));
  color:white;font-size:.92rem;font-weight:700;
  letter-spacing:.04em; margin-top:8px;
  box-shadow:0 4px 16px rgba(33,150,243,.4);
  transition:transform .15s, box-shadow .15s;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(33,150,243,.5);}
.login-hint{text-align:center;margin-top:16px;font-size:.75rem;color:rgba(255,255,255,.25);}

/* ===== APP SHELL ===== */
#appScreen{flex-direction:row;}

.sidebar{
  width:var(--sidebar-w); background:var(--navy);
  min-height:100vh; display:flex;flex-direction:column;
  position:fixed;left:0;top:0;bottom:0;z-index:200;
  box-shadow:4px 0 20px rgba(0,0,0,.2);
}
.sb-brand{
  padding:22px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.sb-brand .logo-row{display:flex;align-items:center;gap:10px;}
.sb-brand .logo-icon{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--sky),var(--cyan));
  display:flex;align-items:center;justify-content:center;font-size:1rem;
  flex-shrink:0;
}
.sb-brand .logo-text{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;color:white;line-height:1.2;}
.sb-brand .logo-sub{font-size:.65rem;color:rgba(255,255,255,.35);margin-top:2px;letter-spacing:.06em;}

.sb-user{
  padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:10px;
}
.sb-avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;
  color:white;flex-shrink:0;
}
.sb-user-name{font-size:.83rem;font-weight:600;color:white;}
.sb-user-role{font-size:.68rem;color:rgba(255,255,255,.35);margin-top:2px;}

.sb-nav{flex:1;padding:12px 0;overflow-y:auto;}
.sb-section{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:10px 20px 4px;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 20px; cursor:pointer;
  font-size:.82rem;color:rgba(255,255,255,.5);
  border-left:3px solid transparent;transition:all .15s;
}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85);}
.nav-item.active{background:rgba(33,150,243,.15);color:var(--sky);border-left-color:var(--sky);font-weight:600;}
.nav-item .ni{font-size:.95rem;width:20px;text-align:center;}

.sb-footer{
  padding:14px 20px;border-top:1px solid rgba(255,255,255,.07);
  font-size:.72rem;color:rgba(255,255,255,.2);
}
.logout-btn{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px;cursor:pointer;
  font-size:.82rem;color:rgba(255,255,255,.35);transition:color .15s;
  margin-top:4px;
}
.logout-btn:hover{color:var(--red);}

/* ===== MAIN CONTENT ===== */
.main-area{
  margin-left:var(--sidebar-w);flex:1;
  min-height:100vh;display:flex;flex-direction:column;
}
.topbar{
  background:white;border-bottom:1px solid var(--border);
  padding:0 28px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.tb-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--navy);}
.tb-right{display:flex;align-items:center;gap:12px;}
.tb-badge{
  background:var(--navy);color:white;font-size:.7rem;font-weight:700;
  padding:4px 12px;border-radius:20px;letter-spacing:.06em;
}
.tb-icon{
  width:34px;height:34px;border-radius:50%;
  background:var(--light);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;cursor:pointer;position:relative;
}
.tb-dot{position:absolute;top:5px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid white;}

.page-content{padding:24px 28px;flex:1;}

/* ===== VIEWS ===== */
.view{display:none;}
.view.active{display:block;}

/* ===== COMMON COMPONENTS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.anim{animation:fadeUp .35s ease both;}
.anim1{animation-delay:.05s;}
.anim2{animation-delay:.1s;}
.anim3{animation-delay:.15s;}
.anim4{animation-delay:.2s;}

.page-header{margin-bottom:22px;}
.page-header h2{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--navy);}
.page-header p{color:var(--muted);font-size:.83rem;margin-top:3px;}

.stats-grid{display:grid;gap:14px;margin-bottom:22px;}
.stats-grid.cols4{grid-template-columns:repeat(4,1fr);}
.stats-grid.cols3{grid-template-columns:repeat(3,1fr);}

.stat-card{
  background:white;border-radius:12px;padding:18px;
  border:1px solid var(--border);box-shadow:0 2px 6px rgba(0,0,0,.04);
  display:flex;align-items:center;gap:14px;
  transition:transform .18s,box-shadow .18s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08);}
.stat-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.si-blue{background:#dbeafe;} .si-green{background:#d1fae5;} .si-gold{background:#fef3c7;} .si-red{background:#fee2e2;} .si-purple{background:#ede9fe;} .si-cyan{background:#cffafe;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:500;color:var(--navy);line-height:1;}
.stat-lbl{font-size:.72rem;color:var(--muted);margin-top:4px;}

.card{background:white;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 6px rgba(0,0,0,.04);overflow:hidden;margin-bottom:18px;}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:var(--navy);}
.card-action{font-size:.75rem;color:var(--sky);cursor:pointer;font-weight:600;}
.card-body{padding:18px 20px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:18px;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 0 10px;text-align:left;}
.data-table td{padding:10px 0;border-bottom:1px solid var(--border);font-size:.82rem;}
.data-table tr:last-child td{border-bottom:none;}
.data-table td:first-child{font-weight:500;color:var(--navy);}

/* PILLS */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;}
.pill-blue{background:#dbeafe;color:var(--blue);}
.pill-green{background:#d1fae5;color:#059669;}
.pill-gold{background:#fef3c7;color:#b45309;}
.pill-red{background:#fee2e2;color:#dc2626;}
.pill-purple{background:#ede9fe;color:#7c3aed;}
.pill-gray{background:#f1f5f9;color:var(--muted);}
.pill-cyan{background:#cffafe;color:#0e7490;}

/* GRADE BADGE */
.grade{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;}
.g-O{background:#d1fae5;color:#059669;}
.g-A{background:#dbeafe;color:var(--blue);}
.g-B{background:#fef3c7;color:#b45309;}
.g-C{background:#fee2e2;color:#dc2626;}
.g-F{background:#1f2937;color:white;}

/* PROGRESS BAR */
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-bar{flex:1;height:7px;border-radius:4px;background:var(--light);overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;}
.pf-green{background:linear-gradient(90deg,#10b981,#34d399);}
.pf-blue{background:linear-gradient(90deg,var(--blue),var(--sky));}
.pf-gold{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.pf-red{background:linear-gradient(90deg,#ef4444,#f87171);}
.prog-val{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:500;min-width:38px;text-align:right;}

/* WELCOME BANNER */
.welcome-banner{
  border-radius:14px;padding:24px 28px;margin-bottom:22px;
  background:linear-gradient(120deg,var(--navy) 0%,#1e3a5f 60%,#1565c0 100%);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
}
.welcome-banner::before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);}
.welcome-banner::after{content:'';position:absolute;right:80px;bottom:-60px;width:130px;height:130px;border-radius:50%;background:rgba(33,150,243,.1);}
.wb-text h2{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:white;}
.wb-text p{color:rgba(255,255,255,.55);font-size:.83rem;margin-top:5px;}
.wb-metric{
  background:rgba(255,255,255,.1);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.15);border-radius:12px;
  padding:14px 22px;text-align:center;color:white;position:relative;z-index:1;
}
.wb-metric .val{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:500;color:var(--gold);line-height:1;}
.wb-metric .lbl{font-size:.68rem;color:rgba(255,255,255,.45);margin-top:4px;letter-spacing:.06em;}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.f-group{display:flex;flex-direction:column;gap:5px;}
.f-group label{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.f-group input,.f-group select,.f-group textarea{
  padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);
  font-size:.85rem;outline:none;transition:border-color .2s;color:var(--ink);background:white;
}
.f-group input:focus,.f-group select:focus,.f-group textarea:focus{border-color:var(--sky);}
.btn-primary{
  padding:10px 22px;border-radius:8px;border:none;
  background:linear-gradient(90deg,var(--blue),var(--sky));
  color:white;font-size:.85rem;font-weight:700;
  box-shadow:0 3px 10px rgba(33,150,243,.35);transition:transform .15s;
}
.btn-primary:hover{transform:translateY(-1px);}
.btn-secondary{
  padding:10px 22px;border-radius:8px;border:1.5px solid var(--border);
  background:white;color:var(--ink);font-size:.85rem;font-weight:600;transition:border-color .2s;
}
.btn-secondary:hover{border-color:var(--sky);}
.btn-danger{padding:6px 14px;border-radius:7px;border:none;background:#fee2e2;color:#dc2626;font-size:.75rem;font-weight:700;}
.btn-success{padding:6px 14px;border-radius:7px;border:none;background:#d1fae5;color:#059669;font-size:.75rem;font-weight:700;}
.btn-edit{padding:6px 14px;border-radius:7px;border:none;background:#dbeafe;color:var(--blue);font-size:.75rem;font-weight:700;}

/* NOTICE ITEM */
.notice-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.notice-item:last-child{border-bottom:none;}
.n-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.n-title{font-size:.83rem;font-weight:600;color:var(--navy);}
.n-meta{font-size:.7rem;color:var(--muted);margin-top:2px;}

/* ATTENDANCE SUBJECT ROW */
.att-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.att-sub{font-size:.82rem;font-weight:500;flex:0 0 80px;}
.att-pct{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:500;width:40px;text-align:right;}

/* TIMETABLE CELL */
.tt-cell{
  background:var(--light);border-radius:8px;padding:8px 10px;
  font-size:.75rem;line-height:1.4;border-left:3px solid var(--sky);
}
.tt-cell.empty{background:none;border-left:none;color:var(--muted);}
.tt-grid{display:grid;grid-template-columns:80px repeat(5,1fr);gap:6px;}
.tt-header{font-size:.68rem;font-weight:700;color:var(--muted);text-align:center;padding:6px 0;}
.tt-time{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);display:flex;align-items:center;}

/* TIMELINE */
.timeline{position:relative;padding-left:24px;}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border);}
.tl-item{position:relative;margin-bottom:18px;}
.tl-dot{position:absolute;left:-20px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid white;flex-shrink:0;}
.tl-title{font-size:.83rem;font-weight:600;color:var(--navy);}
.tl-meta{font-size:.72rem;color:var(--muted);margin-top:2px;}
.tl-body{font-size:.8rem;color:var(--ink);margin-top:4px;}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;}
.tab{padding:9px 16px;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s;}
.tab.active{color:var(--sky);border-bottom-color:var(--sky);}

/* CHART BAR */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px;padding-top:10px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--sky),var(--blue));transition:height .5s ease;}
.bar-lbl{font-size:.65rem;color:var(--muted);}
.bar-val{font-size:.7rem;font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--navy);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:16px;padding:28px;width:500px;max-width:95vw;box-shadow:0 30px 60px rgba(0,0,0,.3);animation:fadeUp .25s ease;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--navy);}
.modal-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:white;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--navy);color:white;padding:12px 20px;
  border-radius:10px;font-size:.83rem;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="loginScreen" class="screen active">
  <div class="login-grid"></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="emblem">🎓</div>
      <h1>College Record Management</h1>
      <p>State Technical University — Computer Engineering</p>
    </div>
    <div class="portal-tabs">
      <button class="ptab active" onclick="setPortal('student',this)">Student</button>
      <button class="ptab" onclick="setPortal('faculty',this)">Faculty</button>
      <button class="ptab" onclick="setPortal('admin',this)">Admin</button>
    </div>
    <div class="form-group">
      <label>Roll / Employee / Admin ID</label>
      <input type="text" id="loginId" placeholder="e.g. CE2021042">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="doLogin()">Login to Portal →</button>
    <p class="login-hint">Demo: any ID + any password</p>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="appScreen" class="screen">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="logo-row">
        <div class="logo-icon">🎓</div>
        <div>
          <div class="logo-text">STU CRM</div>
          <div class="logo-sub">COMPUTER ENGINEERING</div>
        </div>
      </div>
    </div>
    <div class="sb-user" id="sbUser"></div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div>
      <div class="logout-btn" onclick="doLogout()">⬅️ Logout</div>
      <div class="sb-footer">Session 2024–25 · Sem VI</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <header class="topbar">
      <div class="tb-title" id="tbTitle">Dashboard</div>
      <div class="tb-right">
        <div class="tb-badge" id="tbBadge">STUDENT</div>
        <div class="tb-icon">🔔<span class="tb-dot"></span></div>
        <div class="tb-icon" id="tbAvatar" style="font-size:.75rem;font-weight:700;"></div>
      </div>
    </header>

function loadView(view){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el = document.getElementById('nav-'+view);

  currentView = view;
  const label = PORTALS[currentPortal].nav.find(n=>n.view===view)?.label||'';
  document.getElementById('tbTitle').textContent = label;
  document.getElementById('pageContent').innerHTML = getView(view);
  // animate bars after render
  setTimeout(()=>{
    document.querySelectorAll('.prog-fill').forEach(b=>{ const w=b.getAttribute('data-w'); if(w) b.style.width=w+'%'; });
    document.querySelectorAll('.bar-fill').forEach(b=>{ const h=b.getAttribute('data-h'); if(h) b.style.height=h+'px'; });
  },100);
}

/* ==================== HELPERS ==================== */
function stat(icon,val,lbl,cls){
  return `<div class="stat-card"><div class="stat-icon ${cls}">${icon}</div><div><div class="stat-val">${val}</div><div class="stat-lbl">${lbl}</div></div></div>`;
}

function ttRow(time,sub,room,pill){
  return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
    <div style="font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);width:90px;flex-shrink:0">${time}</div>
    <span class="pill ${pill}">${sub}</span>
    <div style="font-size:.75rem;color:var(--muted);margin-left:auto">${room}</div>
  </div>`;
}

function attRow(sub,pct,cls=''){
  const c = pct>=75?(cls||'pf-green'):pct>=60?'pf-gold':'pf-red';
  return `<div class="att-row">
    <div class="att-sub">${sub}</div>
    <div class="prog-bar"><div class="prog-fill ${c}" data-w="${pct}" style="width:0"></div></div>
    <div class="att-pct">${pct}%</div>
  </div>`;
}

function profileRow(label,val){
  return `<div style="display:flex;padding:9px 0;border-bottom:1px solid var(--border);font-size:.83rem">
    <div style="color:var(--muted);width:130px;flex-shrink:0">${label}</div>
    <div style="font-weight:500;color:var(--navy)">${val}</div>
  </div>`;
}

function showNotice(i){
  const n = DATA.notices[i];
  document.getElementById('modalTitle').textContent = n.title;
  document.getElementById('modalBody').innerHTML = `
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:12px">${n.from} · ${n.date}</p>
    <p style="font-size:.88rem;line-height:1.7;color:var(--ink)">${n.body}</p>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function openAddStudentModal(){
  document.getElementById('modalTitle').textContent = 'Add New Student';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-row"><div class="f-group"><label>Full Name</label><input type="text" placeholder="Student name"></div><div class="f-group"><label>Roll No</label><input type="text" placeholder="CE2025001"></div></div>
    <div class="form-row"><div class="f-group"><label>Division</label><select><option>Q</option><option>R</option></select></div><div class="f-group"><label>Semester</label><select>${[1,2,3,4,5,6].map(s=>`<option>${s}</option>`).join('')}</select></div></div>
    <div class="form-row"><div class="f-group"><label>Email</label><input type="email" placeholder="email@stu.edu"></div><div class="f-group"><label>Phone</label><input type="tel" placeholder="+91 XXXXX XXXXX"></div></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-primary" onclick="toast('Student added!');closeModal()">Add Student</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
